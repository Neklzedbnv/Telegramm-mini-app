specVersion: 0.0.5
schema:
  file: ./schema.graphql
dataSources:
  - kind: ethereum
    name: LendingPoolV1
    network: arbitrum-sepolia
    source:
      address: "0x0000000000000000000000000000000000000000" # replace with deployed proxy address
      abi: LendingPoolV1
      startBlock: 0
    mapping:
      kind: ethereum/events
      apiVersion: 0.0.7
      language: wasm/assemblyscript
      entities:
        - Deposit
        - Borrow
        - Repay
        - Liquidation
        - UserPosition
      abis:
        - name: LendingPoolV1
          file: ./abis/LendingPoolV1.json
      eventHandlers:
        - event: Deposited(indexed address,indexed address,uint256)
          handler: handleDeposited
        - event: Borrowed(indexed address,indexed address,uint256)
          handler: handleBorrowed
        - event: Repaid(indexed address,indexed address,uint256)
          handler: handleRepaid
        - event: Liquidated(indexed address,indexed address,indexed address,address,uint256,uint256)
          handler: handleLiquidated
      file: ./src/mappings.ts
