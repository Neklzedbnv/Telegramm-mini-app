type Deposit @entity(immutable: true) {
  id: Bytes!
  user: Bytes! # address
  token: Bytes! # address
  amount: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Borrow @entity(immutable: true) {
  id: Bytes!
  user: Bytes!
  token: Bytes!
  amount: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Repay @entity(immutable: true) {
  id: Bytes!
  user: Bytes!
  token: Bytes!
  amount: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type Liquidation @entity(immutable: true) {
  id: Bytes!
  liquidator: Bytes!
  borrower: Bytes!
  collateralToken: Bytes!
  debtToken: Bytes!
  debtRepaid: BigInt!
  collateralSeized: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type UserPosition @entity(immutable: false) {
  id: Bytes! # user address
  totalDeposited: BigInt!
  totalBorrowed: BigInt!
  totalRepaid: BigInt!
  liquidationCount: Int!
  lastActivityTimestamp: BigInt!
}

# ─── AMM Entities ────────────────────────────────────────────────────────────

type Swap @entity(immutable: true) {
  id: Bytes!
  sender: Bytes! # address
  tokenIn: Bytes! # address
  amountIn: BigInt!
  tokenOut: Bytes! # address
  amountOut: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type LiquidityAdded @entity(immutable: true) {
  id: Bytes!
  provider: Bytes! # address
  amountA: BigInt!
  amountB: BigInt!
  shares: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type LiquidityRemoved @entity(immutable: true) {
  id: Bytes!
  provider: Bytes! # address
  amountA: BigInt!
  amountB: BigInt!
  shares: BigInt!
  blockNumber: BigInt!
  blockTimestamp: BigInt!
  transactionHash: Bytes!
}

type AMMStats @entity(immutable: false) {
  id: Bytes! # singleton: Bytes("amm")
  totalSwaps: BigInt!
  totalVolumeTokenA: BigInt!
  totalVolumeTokenB: BigInt!
  lastUpdatedTimestamp: BigInt!
}
